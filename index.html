<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quét QR - Quản lý linh kiện</title>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f2f2f2;
            color: #222;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 12px;
        }

        h1 {
            font-size: 1.2em;
            text-align: center;
            margin: 8px 0 12px;
        }

        #status {
            text-align: center;
            font-weight: 600;
            margin: 8px 0;
            min-height: 1.2em;
        }

        /* --- Camera --- */
        #camera-section {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #reader {
            width: 100%;
        }

        /* --- Control panel (sau khi quét thành công) --- */
        #control-panel {
            display: none;
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        #qr-info {
            word-break: break-all;
            background: #f7f7f7;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.95em;
            margin-bottom: 14px;
            border: 1px solid #e0e0e0;
            font-weight: 600;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 100px;
            padding: 14px 10px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
        }

        .btn-add { background: #2e7d32; }
        .btn-delete { background: #c62828; }
        .btn-cancel { background: #757575; }

        button:active { opacity: 0.85; }

        /* --- History --- */
        #history-container {
            margin-top: 16px;
        }

        #history-container h2 {
            font-size: 1em;
            margin: 0 0 8px;
        }

        #history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            color: #fff;
            font-weight: 600;
        }

        .badge-add { background: #2e7d32; }
        .badge-delete { background: #c62828; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>📷 Quét mã QR - Linh kiện</h1>
    <div id="status">Đang khởi động camera...</div>

    <div id="camera-section">
        <div id="reader"></div>
    </div>

    <div id="control-panel">
        <div id="qr-info"></div>
        <div class="btn-row">
            <button class="btn-add" onclick="sendData('Add')">➕ Thêm</button>
            <button class="btn-delete" onclick="sendData('Delete')">🗑️ Xóa</button>
            <button class="btn-cancel" onclick="resumeScanner()">↩️ Hủy / Quét lại</button>
        </div>
    </div>

    <div id="history-container">
        <h2>Lịch sử quét gần đây</h2>
        <div id="history-list"></div>
    </div>
</div>

<script>
        // CẤU HÌNH ĐƯỜNG DẪN ĐẾN SHEET CỦA BẠN
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1nIJUxElDyCmR3dGo3-wKIGUaWvIIBQJGNHrOrwMoD8DONBvDFxcBnmMmLHDSy4zq1A/exec";
        const CURRENT_USER = "User1";

        let html5QrCode;
        let isScanning = false;
        let currentQRText = "";
        let scanHistory = [];

        // Cấu hình quét cơ bản, an toàn tuyệt đối cho mọi thiết bị
        const scanConfig = {
            fps: 15,
            qrbox: { width: 250, height: 250 }
        };

        function startScanner() {
            html5QrCode = new Html5QrCode("reader");

            // Chỉ định gọi camera sau bằng cấu hình an toàn tiêu chuẩn
            html5QrCode.start(
                { facingMode: "environment" },
                scanConfig,
                onScanSuccess
            )
            .then(() => {
                isScanning = true;
                document.getElementById('status').innerText = "Sẵn sàng quét...";
                document.getElementById('status').style.color = "green";
            })
            .catch(err => {
                document.getElementById('status').innerText = "Không thể mở camera. Hãy kiểm tra quyền truy cập!";
                document.getElementById('status').style.color = "red";
                console.error(err);
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;
            isScanning = false; // Chặn tạm thời không cho quét tiếp liên tục
            currentQRText = decodedText;

            // Ẩn màn hình camera, mở bảng điều khiển nút bấm lên
            document.getElementById('camera-section').style.display = 'none';
            document.getElementById('control-panel').style.display = 'block';
            document.getElementById('qr-info').innerText = "Nội dung QR: " + decodedText;
            document.getElementById('status').innerText = "Vui lòng chọn hành động...";
            document.getElementById('status').style.color = "orange";
        }

        function sendData(actionType) {
            document.getElementById('status').innerText = `Đang gửi lệnh ${actionType}...`;
            document.getElementById('status').style.color = "orange";
            const vietnamTime = new Date().toLocaleString("vi-VN", { timeZone: "Asia/Ho_Chi_Minh" });

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    qrContent: currentQRText,
                    timestamp: vietnamTime,
                    action: actionType,
                    user: CURRENT_USER
                })
            })
            .then(() => {
                document.getElementById('status').innerText = `Đã lưu thành công: ${actionType}!`;
                document.getElementById('status').style.color = "green";
                updateHistory(vietnamTime, currentQRText, actionType);
                resumeScanner();
            })
            .catch(err => {
                document.getElementById('status').innerText = "Lỗi kết nối. Vui lòng bấm lại!";
                document.getElementById('status').style.color = "red";
                isScanning = false;
            });
        }

        function resumeScanner() {
            document.getElementById('control-panel').style.display = 'none';
            document.getElementById('camera-section').style.display = 'block';
            document.getElementById('status').innerText = "Sẵn sàng quét...";
            document.getElementById('status').style.color = "green";

            isScanning = true;
        }

        function updateHistory(time, content, action) {
            scanHistory.unshift({ time, content, action });
            if (scanHistory.length > 10) scanHistory.pop();

            const listContainer = document.getElementById('history-list');
            listContainer.innerHTML = "";

            scanHistory.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "history-item";
                const shortContent = item.content.length > 22 ? item.content.substring(0, 22) + "..." : item.content;
                const badgeClass = item.action === 'Add' ? 'badge-add' : 'badge-delete';
                const timeOnly = item.time.split(" ")[1] || "";

                itemDiv.innerHTML = `
                    <span><b>[${timeOnly}]</b> ${shortContent}</span>
                    <span class="badge ${badgeClass}">${item.action}</span>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        // Tự động kích hoạt khi tải xong trang
        window.addEventListener("DOMContentLoaded", startScanner);
</script>
</body>
</html>
